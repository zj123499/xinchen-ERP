# ============================================
# 新辰ERP - Docker Compose 生产部署
# ============================================

services:
  xinchen-erp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xinchen-erp
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - 1panel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  1panel-network:
    external: true
